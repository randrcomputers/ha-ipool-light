set_rgb_effect:
  name: Set RGB effect
  description: >-
    Run an iPool / LedBle animation preset (jump, gradient, flash). Stores the
    active effect on the light entity for the pool light card.
  fields:
    entity_id:
      required: true
      example: light.ipool_10_light
      selector:
        entity:
          domain: light
    effect:
      required: true
      example: Tricolor jump
      selector:
        select:
          options:
            - Static red
            - Static blue
            - Static green
            - Static cyan
            - Static yellow
            - Static purple
            - Static white
            - Tricolor jump
            - Seven-color jump
            - Tricolor gradient
            - Seven-color gradient
            - Red gradient
            - Green gradient
            - Blue gradient
            - Yellow gradient
            - Cyan gradient
            - Purple gradient
            - White gradient
            - Red-Green gradient
            - Red-Blue gradient
            - Green-Blue gradient
            - Seven-color flash
            - Red flash
            - Green flash
            - Blue flash
            - Yellow flash
            - Cyan flash
            - Purple flash
            - White flash
    turn_on_first:
      default: true
      selector:
        boolean:
    speed:
      required: false
      name: Effect speed
      description: Animation speed 1 (slow) to 10 (fast). Default 3.
      example: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider

set_effect_speed:
  name: Set effect speed
  description: >-
    Change animation speed for the current effect (re-sends the active preset).
  fields:
    entity_id:
      required: true
      example: light.ipool_10_light
      selector:
        entity:
          domain: light
    speed:
      required: true
      example: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider
